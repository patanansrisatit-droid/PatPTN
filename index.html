<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[PTN.EDU] TOEIC Tutoring Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-900 text-slate-800 min-h-screen flex flex-col justify-center items-center overflow-hidden font-sans antialiased selection:bg-blue-500 selection:text-white">

<div id="toolbar" class="hidden fixed top-0 left-0 right-0 bg-slate-800/95 backdrop-blur-md px-6 py-2.5 flex gap-2 items-center justify-center shadow-2xl z-[99999] border-b border-slate-700 flex-wrap" style="white-space:nowrap">
    <button onclick="goHome()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1.5 shadow-md shadow-rose-600/20 shrink-0">
        <i data-lucide="home" class="w-3.5 h-3.5"></i> Home
    </button>
    <div class="h-5 w-px bg-slate-700 shrink-0"></div>
    <button id="tool-mouse" data-tooltip="(Esc)" onclick="setTool('mouse')" class="tool-btn bg-blue-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1.5 shrink-0">
        <i data-lucide="mouse-pointer" class="w-3.5 h-3.5"></i> Select
    </button>
    <button id="tool-pen" data-tooltip="(Num 1)" onclick="setTool('pen')" class="tool-btn bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1.5 shrink-0">
        <i data-lucide="pen-tool" class="w-3.5 h-3.5"></i> Pen
    </button>
    <button id="tool-highlighter" data-tooltip="(Num 2)" onclick="setTool('highlighter')" class="tool-btn bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1.5 shrink-0">
        <i data-lucide="highlighter" class="w-3.5 h-3.5"></i> Highlighter
    </button>
    <button id="tool-eraser" data-tooltip="(Num 3)" onclick="setTool('eraser')" class="tool-btn bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1.5 shrink-0">
        <i data-lucide="eraser" class="w-3.5 h-3.5"></i> Eraser
    </button>
    <div id="stroke-controls" class="flex items-center gap-2 bg-slate-950 px-3 py-1 rounded-lg border border-slate-800 text-xs text-slate-300 transition-all duration-200 shrink-0">
        <span id="size-label">Size:</span>
        <input type="range" id="size-slider" min="1" max="40" value="3" class="w-16 accent-blue-500 cursor-pointer" oninput="onSizeChange(this.value)">
        <span id="size-val" class="min-w-[18px]">3</span>
        <span id="opacity-wrap" class="flex items-center gap-2 ml-1 transition-all duration-200">
            <span>Opacity:</span>
            <input type="range" id="opacity-slider" min="5" max="100" value="100" class="w-16 accent-blue-500 cursor-pointer" oninput="onOpacityChange(this.value)">
            <span id="opacity-val" class="min-w-[30px]">100%</span>
        </span>
    </div>
    <div id="color-controls-container" class="flex items-center gap-1.5 bg-slate-950 px-3 py-1 rounded-lg border border-slate-800 transition-all duration-200 shrink-0">
        <div class="color-dot w-4 h-4 rounded-full cursor-pointer border-2 border-white scale-110" style="background:#ef4444" onclick="selectColor('#ef4444',this)"></div>
        <div class="color-dot w-4 h-4 rounded-full cursor-pointer border border-transparent" style="background:#000000" onclick="selectColor('#000000',this)"></div>
        <div class="color-dot w-4 h-4 rounded-full cursor-pointer border border-transparent" style="background:#22c55e" onclick="selectColor('#22c55e',this)"></div>
        <div class="color-dot w-4 h-4 rounded-full cursor-pointer border border-transparent" style="background:#3b82f6" onclick="selectColor('#3b82f6',this)"></div>
        <div class="relative w-4 h-4 cursor-pointer overflow-hidden rounded-full border border-slate-700 bg-gradient-to-tr from-red-500 via-green-500 to-blue-500 hover:scale-110 transition">
            <input type="color" id="colorPicker" class="absolute inset-0 opacity-0 cursor-pointer" value="#ef4444" onchange="selectCustomColor(this.value)">
        </div>
    </div>
        <button onclick="undo()" data-tooltip="(Ctrl+Z)" class="bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1 shrink-0">
            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Undo
        </button>
        <button onclick="redo()" data-tooltip="(Ctrl+Y)" class="bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1 shrink-0">
            <i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i> Redo
        </button>
        <button onclick="clearCurrentCanvas()" data-tooltip="Clear Canvas" class="bg-slate-600 hover:bg-slate-500 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition flex items-center gap-1 shrink-0">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Clear
        </button>
</div>
<div id="home-screen" class="w-full max-w-6xl px-6 py-12 max-h-[90vh] overflow-y-auto z-[200] relative">
    <div class="text-center mb-10">
        <div class="mb-6 flex justify-center">
            <div class="w-32 h-32 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl shadow-2xl shadow-blue-500/30 flex items-center justify-center transform rotate-3 hover:rotate-0 transition-transform duration-300">
                <i data-lucide="graduation-cap" class="w-16 h-16 text-white"></i>
            </div>
        </div>
        <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">TOEIC TUTORING PLATFORM</h1>
        <p class="text-slate-400 text-base">Click to choose an examination set</p>
    </div>
    <div id="exam-sets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>
<div id="tutor-screen" class="hidden w-[98%] max-w-[2000px] h-[92vh] bg-white shadow-2xl rounded-2xl overflow-hidden relative border border-slate-200 mt-14 flex flex-col">
    <div id="top-bar" class="px-6 py-3 border-b border-slate-100 bg-white shrink-0">
        <div class="flex justify-between items-center mb-2">
            <span id="question-counter" class="text-sm font-bold text-blue-600 tracking-wide uppercase">Question 1 of 2</span>
            <span id="progress-percent" class="text-xs font-semibold text-slate-400">50% Complete</span>
        </div>
        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-3">
            <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-300" style="width:0%"></div>
        </div>
        <div id="audio-container" class="bg-blue-50 border-l-4 border-blue-500 p-2 rounded-r-xl flex items-center gap-3 shadow-sm">
            <button id="audio-play-btn" onclick="toggleAudio()" class="bg-blue-600 text-white p-1.5 rounded-full hover:bg-blue-700 transition" style="position:relative;z-index:150">
                <i data-lucide="play" id="audio-icon" class="w-4 h-4"></i>
            </button>
            <div class="flex-1">
                <div class="text-xs font-bold text-blue-700">Listening Audio Track</div>
                <audio id="audio-player" src="" class="hidden"></audio>
                <div class="text-[10px] text-blue-600 font-medium" id="audio-status">Click to Play</div>
            </div>
    </div>
            </div>
    <div id="viewport-workspace">
        <div id="zoomable-content">
            <div id="content-area" class="flex min-h-0">
                <div id="left-panel" class="w-[60%] bg-slate-50 border-r border-slate-200 p-6 overflow-y-auto">
                    <div id="image-gallery"></div>
                </div>
                <div id="images-area" class="hidden"></div>
                <div id="question-panel" class="flex-1 overflow-y-auto p-6 relative">
                    <div id="question-panel-wrapper" class="relative min-h-0">
                        <canvas id="rightPanelCanvas" data-element-id="question-panel" class="gallery-canvas right-panel-canvas"></canvas>
                        <div id="questions-area" class="relative">
                            <div id="questions-wrapper"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="nav-buttons" class="flex justify-between items-center px-6 py-3 border-t border-slate-100 bg-white shrink-0" style="position:relative;z-index:150">
        <button id="btn-prev" onclick="moveQuestion(-1)" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-5 py-3 rounded-xl text-base transition flex items-center gap-1.5">
            <i data-lucide="chevron-left" class="w-4 h-4"></i> Back
        </button>
        <div class="relative flex items-center gap-2">
            <button id="jump-btn" onclick="toggleJumpDropdown()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-5 py-3 rounded-xl text-base transition flex items-center gap-1.5">
                <i data-lucide="grid-3x3" class="w-4 h-4"></i> Jump
            </button>
            <div id="jump-dropdown" class="hidden absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-white border border-slate-200 rounded-xl shadow-2xl p-3 z-[9999]" style="width: 310px;">
                <div class="text-xs text-slate-400 font-medium mb-2 text-center">Select question number</div>
                <div id="jump-grid" class="grid grid-cols-10 gap-1">
                </div>
            </div>
        </div>

        <button id="btn-next" onclick="moveQuestion(1)" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-3 rounded-xl text-base shadow-md shadow-blue-200 transition flex items-center gap-1.5">
            Next <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
    </div>
</div>
<div id="zoom-overlay" class="hidden fixed inset-0 bg-slate-950/95 z-[9998] select-none flex flex-col">
    <div id="mini-map-container" class="absolute bottom-24 right-4 w-40 bg-slate-900 border-2 border-slate-700 rounded-xl overflow-hidden shadow-2xl z-[999999] hidden">
        <div class="text-[10px] text-slate-400 font-bold px-2 py-0.5 bg-slate-800 border-b border-slate-700 text-center">Mini-Map</div>
        <div class="relative w-full flex items-center justify-center p-1">
            <img id="minimap-img" src="" class="max-w-full max-h-32 object-contain opacity-50">
            <div id="minimap-viewer" class="absolute border-2 border-red-500 bg-red-500/10 pointer-events-none transition-all duration-75"></div>
        </div>
    </div>
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 z-[999999]">
        <div class="bg-slate-800/90 text-white px-4 py-2 rounded-xl flex items-center gap-3 border border-slate-700 text-sm shadow-xl">
            <i data-lucide="zoom-in" class="w-4 h-4 text-slate-400"></i>
            <span>Zoom:</span>
            <input type="range" id="zoom-slider" min="1" max="4" step="0.2" value="1" class="w-32 accent-blue-500" oninput="handleZoomSlider(this.value)">
            <span id="zoom-val" class="font-bold min-w-[35px]">1.0x</span>
        </div>
        <button onclick="closeZoom()" class="bg-rose-600 hover:bg-rose-700 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold shadow-lg transition">
            <i data-lucide="x" class="w-5 h-5"></i>
        </button>
    </div>
    <div id="zoom-viewport" class="flex-1 flex items-center justify-center overflow-hidden cursor-grab active:cursor-grabbing">
        <div id="zoom-transform-container" class="relative">
            <img id="zoomed-image" src="" alt="Zoomed" class="max-w-[95vw] max-h-[calc(85vh-80px)] object-contain pointer-events-none select-none" style="z-index:100">
            <canvas id="zoomCanvas" data-element-id="" class="gallery-canvas absolute top-0 left-0 w-full h-full" style="z-index:200"></canvas>
        </div>
    </div>
</div>
<script src="content.js"></script>
<script src="script.js"></script>
    <div id="canvas-custom-cursor" class="fixed pointer-events-none rounded-full z-[999999] hidden -translate-x-1/2 -translate-y-1/2 transition-[width,height,background-color] duration-75"></div>
</body>
</html>
